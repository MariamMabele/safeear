<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Session Expired — SafeEar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f7f4ef;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{text-align:center;max-width:400px;width:100%}
    .icon{width:72px;height:72px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2rem}
    h1{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-0.5px;margin-bottom:14px;color:#1a1a1a}
    p{color:#6b7280;font-size:15px;line-height:1.7;margin-bottom:10px;font-weight:300}
    a{color:#1D9E75;font-weight:500;text-decoration:none}
    a:hover{text-decoration:underline}
    .meta{font-size:12px;color:#9ca3af;margin-top:24px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⏱</div>
    <h1>Session Expired</h1>
    <p>This session link has expired. Session links are only valid for the booked duration.</p>
    <p>To book a new session, visit <a href="https://safe-ear.com">safe-ear.com</a></p>
    <p class="meta">If you think this is a mistake, please contact SafeEar directly.</p>
  </div>
</body>
</html>
